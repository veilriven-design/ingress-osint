name: Publish GitHub Pages

on:
  push:
    branches:
      - main
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ingress
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[full]"

      - name: Refresh static dashboard data
        env:
          INGRESS_DB_URL: sqlite:///${{ runner.temp }}/ingress-pages.db
        run: |
          set -eu
          if ! ingress ingest target --iran --russia --china --db-url "${INGRESS_DB_URL}" --limit 120; then
            echo "::warning::Public-source collection failed; publishing the previous static snapshot."
          fi
          ingress export-static-dashboard \
            --db-url "${INGRESS_DB_URL}" \
            --output src/ingress/web/assets/dashboard-static.json \
            --fallback src/ingress/web/assets/dashboard-static.json \
            --limit 120

      - name: Publish static bundle to gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eu
          publish_dir="${RUNNER_TEMP}/ingress-pages"
          rm -rf "${publish_dir}"
          mkdir -p "${publish_dir}"
          cp -a src/ingress/web/. "${publish_dir}/"

          cd "${publish_dir}"
          git init
          git checkout -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Deploy Ingress static console"
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin gh-pages
